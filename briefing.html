<style>
:root{--primary:#3D5AFE;--primary-light:#ECEFFF;--primary-dark:#2541E0;--text:#1A1A1A;--text-muted:#6B7280;--bg:#FAFAF8;--bg-card:#FFFFFF;--border:#E5E7EB;--g100:#F2F4F6;--sans:'Noto Sans KR',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:clip;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:clip;}
nav{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;}

.nav-links a{font-size:13px;color:var(--text-muted);text-decoration:none;}
.nav-links a:hover{color:var(--primary);}
.nav-cta{background:var(--primary);color:#fff;font-size:13px;padding:7px 16px;border-radius:6px;text-decoration:none;}
@media(max-width:640px){.nav-links{display:none;}}

/* 히어로 */
.brief-hero{max-width:920px;margin:0 auto;padding:34px 16px 8px;}
.brief-hero h1{font-size:25px;font-weight:800;line-height:1.3;letter-spacing:-.02em;margin-bottom:8px;}
.brief-hero p{font-size:14px;color:var(--text-muted);line-height:1.6;word-break:keep-all;}

/* 업종 필터 (상단 가로 스크롤) — 선택 시 해당 업종 카드 위로 */
.brief-indwrap{max-width:920px;margin:0 auto;padding:14px 16px 0;display:flex;align-items:center;gap:10px;}
.brief-indlb{flex-shrink:0;font-size:12px;font-weight:700;color:var(--text-muted);}
.brief-ind{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;min-width:0;padding-bottom:2px;}
.brief-ind::-webkit-scrollbar{display:none;}
.ind-chip{flex-shrink:0;border:1px solid var(--border);background:#fff;color:var(--text-muted);font-size:13px;font-weight:600;padding:7px 13px;border-radius:9999px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;}
.ind-chip:hover{border-color:var(--primary);color:var(--primary);}
.ind-chip.active{background:#1A1A1A;color:#fff;border-color:#1A1A1A;}
/* 필터된 업종에 해당하는 카드 표시 배지 */
.bz-match{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#0CA678;background:#E6FCF5;border-radius:7px;padding:3px 8px;}
.bz-match svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
.bz-head-l{display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap;min-width:0;}

/* 본문: PC=좌측 레일+피드 / 모바일=상단 가로탭+피드 */
.brief-wrap{max-width:920px;margin:0 auto;padding:18px 16px 80px;display:flex;gap:24px;align-items:flex-start;}
.brief-cats{display:flex;flex-shrink:0;}
.bcat-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;color:var(--text-muted);font-size:14px;font-weight:600;padding:10px 15px;border-radius:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;}
.bcat-btn:hover{border-color:var(--primary);color:var(--primary);}
.bcat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.bcat-btn svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brief-feed{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;}

/* PC(≥860): 좌측 세로 사이드 레일 */
@media(min-width:860px){
  .brief-cats{flex-direction:column;width:188px;gap:6px;position:sticky;top:72px;}
  .bcat-btn{width:100%;justify-content:flex-start;}
}
/* 모바일(<860): 상단 가로 스크롤 탭 */
@media(max-width:859px){
  .brief-wrap{flex-direction:column;gap:14px;}
  .brief-cats{flex-direction:row;gap:8px;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}

}

/* 브리핑 카드 (9필드: 제목·30초요약·실제영향·해결·계산기·가이드·서식·날짜·영향도) */
.biz-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:18px;box-shadow:0 1px 8px rgba(0,0,0,.04);padding:18px 18px 15px;}
.bz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.bz-catlabel{display:inline-block;font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);border-radius:7px;padding:3px 9px;}
.bz-stars{display:inline-flex;gap:1.5px;flex-shrink:0;}
.bz-st{width:15px;height:15px;}
.bz-st.on{fill:currentColor;}
.bz-st.off{fill:#E5E8EB;}
.bz-stars.r5{color:#F04452;}
.bz-stars.r4{color:#FF8A3D;}
.bz-stars.r3{color:#FFB800;}
.bz-stars.r2{color:#9EA7B4;}
.bz-stars.r1{color:#9EA7B4;}
.bz-title{font-size:16.5px;font-weight:800;color:var(--text);line-height:1.4;letter-spacing:-.01em;margin-bottom:12px;word-break:keep-all;overflow-wrap:anywhere;}
.bz-summary{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:13px;word-break:keep-all;overflow-wrap:anywhere;}
.bz-impact{display:flex;gap:10px;background:#FFF5F5;border:1px solid #FFDFDF;border-radius:12px;padding:12px 14px;margin-bottom:13px;}
.bz-impact-lb{flex-shrink:0;font-size:11px;font-weight:800;color:#fff;background:#F04452;border-radius:7px;padding:3px 8px;height:-moz-fit-content;height:fit-content;white-space:nowrap;}
.bz-impact-tx{flex:1;min-width:0;font-size:13.5px;font-weight:700;color:#E03131;line-height:1.55;word-break:keep-all;overflow-wrap:anywhere;}
.bz-solve{display:flex;gap:9px;margin-bottom:14px;}
.bz-solve-lb{flex-shrink:0;font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);border-radius:8px;padding:3px 8px;height:-moz-fit-content;height:fit-content;white-space:nowrap;}
.bz-solve-tx{flex:1;min-width:0;font-size:13px;color:var(--text-muted);line-height:1.7;word-break:keep-all;overflow-wrap:anywhere;}
.bz-links{display:flex;flex-wrap:wrap;gap:8px;}
.bz-link{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:10px;text-decoration:none;transition:all .15s;}
.bz-link svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.bz-link--calc{background:var(--primary);color:#fff;}
.bz-link--calc:hover{background:var(--primary-dark);}
.bz-link--guide,.bz-link--form{background:#fff;border:1.5px solid var(--border);color:var(--text-muted);}
.bz-link--guide:hover,.bz-link--form:hover{border-color:var(--primary);color:var(--primary);}
.bz-src{margin-top:14px;padding-top:11px;border-top:1px solid var(--g100);font-size:11.5px;color:#ADB5BD;word-break:keep-all;}
.bz-src a{color:var(--text-muted);font-weight:600;}
.bz-src a:hover{color:var(--primary);}
.brief-empty{padding:40px 16px;text-align:center;font-size:14px;color:#ADB5BD;}

footer{background:#1A1A1A;color:rgba(255,255,255,0.6);text-align:center;padding:24px;font-size:12px;}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px;}
</style></head>

<script src="assets/briefing-data.js?v=20260630k"></script>
<script>
/* 소분류 4개 — 순서/아이콘 고정 (이모지 금지, SVG) */
var BRIEF_CATS = [
  { key:'정책·세금', icon:'<path d="M3 21h18"/><path d="M5 21V10l7-5 7 5v11"/><path d="M9 21v-6h6v6"/>' },
  { key:'장사·매출', icon:'<path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/>' },
  { key:'마케팅',   icon:'<path d="M3 11v2a1 1 0 0 0 1 1h3l4 4V6L7 10H4a1 1 0 0 0-1 1z"/><path d="M15.5 8.5a4 4 0 0 1 0 7"/>' },
  { key:'실전 노하우', icon:'<path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.6 1 1.4 1 2.3h6c0-.9.4-1.7 1-2.3A7 7 0 0 0 12 2z"/>' }
];
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

var ALL = (window.SOHO_BRIEFING && window.SOHO_BRIEFING.cards) ? window.SOHO_BRIEFING.cards : [];
var currentInd = '전체';   // 선택된 업종 ('전체'=정렬 안 함)
var currentCat = '';       // 선택된 소분류

/* ⑨ 영향도 별점 — 5:빨강 4:주황 3:노랑 2:회색 (SVG 별, 이모지 금지) */
function stars(n){
  n = Math.max(0, Math.min(5, parseInt(n,10)||0));
  var p='<path d="M12 2l2.9 6.2 6.8.6-5.1 4.5 1.5 6.7L12 17.2 5.9 20.5l1.5-6.7L2.3 8.8l6.8-.6z"/>';
  var h=''; for(var i=1;i<=5;i++){ h+='<svg class="bz-st '+(i<=n?'on':'off')+'" viewBox="0 0 24 24" aria-hidden="true">'+p+'</svg>'; }
  return '<span class="bz-stars r'+n+'" title="영향도 '+n+'/5">'+h+'</span>';
}
/* 링크 아이콘(계산기/가이드/서식) — SVG */
var IC={
  calc:'<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="16" y1="14" x2="16" y2="14.01"/><line x1="8" y1="18" x2="16" y2="18"/>',
  guide:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  form:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>'
};
function lnk(o, kind, ic){
  if(!o || !o.url || !o.label) return '';
  var ext = /^https?:\/\//.test(o.url);
  return '<a class="bz-link bz-link--'+kind+'" href="'+esc(o.url)+'"'+(ext?' target="_blank" rel="noopener"':'')+'><svg viewBox="0 0 24 24" aria-hidden="true">'+ic+'</svg>'+esc(o.label)+'</a>';
}
function ml(s){ return esc(s).replace(/\n/g, '<br>'); }

function hasTag(it, ind){ return ind && ind!=='전체' && Array.isArray(it.tags) && it.tags.indexOf(ind)>=0; }

function cardHtml(it, ind){
  var summary = it.summary ? ('<p class="bz-summary">'+ml(it.summary)+'</p>') : '';
  var impact  = it.impact ? ('<div class="bz-impact"><span class="bz-impact-lb">실제 영향</span><span class="bz-impact-tx">'+ml(it.impact)+'</span></div>') : '';
  var solve   = it.solution ? ('<div class="bz-solve"><span class="bz-solve-lb">이렇게 해보세요</span><span class="bz-solve-tx">'+esc(it.solution)+'</span></div>') : '';
  var l = lnk(it.calc,'calc',IC.calc) + lnk(it.guide,'guide',IC.guide) + lnk(it.form,'form',IC.form);
  var links = l ? ('<div class="bz-links">'+l+'</div>') : '';
  var src = '';
  if(it.source){
    var s = it.sourceUrl ? ('<a href="'+esc(it.sourceUrl)+'" target="_blank" rel="noopener">'+esc(it.source)+'</a>') : esc(it.source);
    src = '<div class="bz-src">출처 · '+s+(it.date?(' · '+esc(it.date)):'')+'</div>';
  }
  var match = hasTag(it, ind) ? ('<span class="bz-match"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>'+esc(ind)+' 관련</span>') : '';
  return '<article class="biz-card">'+
    '<div class="bz-head"><span class="bz-head-l">'+(it.cat?'<span class="bz-catlabel">'+esc(it.cat)+'</span>':'')+match+'</span>'+stars(it.rating)+'</div>'+
    '<h3 class="bz-title">'+esc(it.title||'')+'</h3>'+
    summary + impact + solve + links + src +
    '</article>';
}

function renderFeed(cat){
  currentCat = cat;
  var feed = document.getElementById('brief-feed');
  var list = ALL.filter(function(c){ return c.cat===cat; });
  /* 업종 필터: 선택 업종 태그를 가진 카드를 위로(안정 정렬), 나머지는 아래에 그대로 노출 */
  if(currentInd && currentInd!=='전체'){
    var hit=[], rest=[];
    list.forEach(function(c){ (hasTag(c, currentInd) ? hit : rest).push(c); });
    list = hit.concat(rest);
  }
  if(!list.length){ feed.innerHTML='<div class="brief-empty">이 분류의 소식은 곧 채워집니다.</div>'; return; }
  feed.innerHTML = list.map(function(c){ return cardHtml(c, currentInd); }).join('');
}

function renderCats(){
  var wrap = document.getElementById('brief-cats');
  wrap.innerHTML = BRIEF_CATS.map(function(c, i){
    return '<button class="bcat-btn'+(i===0?' active':'')+'" type="button" role="tab" data-cat="'+esc(c.key)+'">'+
      '<svg viewBox="0 0 24 24" aria-hidden="true">'+c.icon+'</svg>'+esc(c.key)+'</button>';
  }).join('');
  wrap.addEventListener('click', function(e){
    var b = e.target.closest('.bcat-btn'); if(!b) return;
    wrap.querySelectorAll('.bcat-btn').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    renderFeed(b.getAttribute('data-cat'));
  });
}

/* 업종 필터 (이모지 금지, 텍스트 칩). '전체'=정렬 안 함 */
var INDUSTRIES = ['전체','카페','음식점','치킨집','피자','배달전문점','정육점','소매업','편의점','미용실','네일샵','피부관리','펜션','캠핑장','자동차','농업','제조업','1인사업자','법인사업자','기타'];
function renderInd(){
  var w = document.getElementById('brief-ind');
  w.innerHTML = INDUSTRIES.map(function(n, i){
    return '<button class="ind-chip'+(i===0?' active':'')+'" type="button" role="tab" data-ind="'+esc(n)+'">'+esc(n)+'</button>';
  }).join('');
  w.addEventListener('click', function(e){
    var b = e.target.closest('.ind-chip'); if(!b) return;
    w.querySelectorAll('.ind-chip').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    currentInd = b.getAttribute('data-ind');
    renderFeed(currentCat);
  });
}

renderInd();
renderCats();
renderFeed(BRIEF_CATS[0].key);
