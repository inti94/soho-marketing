/* =====================================================================
   소호팁 — 딥 인디고 블링크 카드 피드 (category.html)
   ===================================================================== */
:root{
  --primary:#3D5AFE; --primary-dark:#2541E0; --primary-light:#ECEEFF;
  --primary-grad:linear-gradient(135deg,#3D5AFE,#7B8FFF);
  --bg:#F4F6FB; --white:#FFFFFF;
  --g50:#FAFAFA; --g100:#F2F4F6; --g200:#E5E8EB;
  --g400:#9EA7B4; --g600:#6B7684; --g900:#191F28;
  --red:#F04452; --green:#00C471; --yellow:#FFB800;
  --top:56px; --tabbar:60px;
  --sans:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--g900);line-height:1.6;word-break:keep-all;overflow-wrap:break-word;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}

.shell{max-width:920px;margin:0 auto;padding-bottom:calc(var(--tabbar) + 30px);}

/* ── 헤더 ── */
.topbar{position:sticky;top:0;z-index:300;height:var(--top);background:rgba(255,255,255,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:6px;padding:0 8px;}
.ico-btn{width:44px;height:44px;border-radius:12px;border:none;background:transparent;display:grid;place-items:center;font-size:19px;color:var(--g900);transition:background .15s;flex-shrink:0;}
.ico-btn:hover{background:var(--g100);}
.top-title{flex:1;min-width:0;font-size:16px;font-weight:900;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;}
.top-right{display:flex;flex-shrink:0;}

/* ── 카테고리 정보 바 ── */
.catinfo{background:var(--white);border-bottom:1px solid var(--g200);padding:16px 16px 12px;}
.catinfo .ci-row{display:flex;align-items:center;gap:12px;}
.catinfo .ci-ico{width:40px;height:40px;border-radius:12px;background:var(--primary-light);display:grid;place-items:center;font-size:21px;flex-shrink:0;}
.catinfo .ci-name{font-size:18px;font-weight:900;letter-spacing:-.02em;}
.catinfo .ci-cnt{font-size:12.5px;font-weight:600;color:var(--g400);margin-top:1px;}
/* 필터 칩 */
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 0 2px;margin:0 -2px;}
.chip{flex-shrink:0;border:1px solid var(--g200);background:var(--white);color:var(--g600);font-family:var(--sans);font-size:13px;font-weight:700;padding:8px 15px;border-radius:100px;white-space:nowrap;transition:all .15s;}
.chip:hover{border-color:var(--g400);}
.chip.active{background:var(--g900);color:#fff;border-color:var(--g900);}

/* ── 검색바 ── */
.searchbar{padding:12px 16px 4px;}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--g200);border-radius:14px;padding:0 14px;}
.searchbox .s-ico{font-size:17px;color:var(--g400);}
.searchbox input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:16px;font-weight:500;color:var(--g900);padding:13px 4px;}
.searchbox input::placeholder{color:var(--g400);}
.searchbox .s-clear{border:none;background:transparent;font-size:15px;color:var(--g400);width:28px;height:28px;border-radius:50%;display:none;}
.searchbox .s-clear.show{display:grid;place-items:center;}

/* ── 정렬 행 ── */
.sortrow{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.sortrow .cnt{font-size:13.5px;font-weight:700;color:var(--g600);}
.sortrow .cnt b{color:var(--primary);font-weight:900;}
.sortrow select{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--g900);border:1px solid var(--g200);background:var(--white);border-radius:10px;padding:8px 10px;outline:none;cursor:pointer;}

/* ── 블링크 카드 피드 ── */
.feed{display:grid;grid-template-columns:1fr;gap:10px;padding:0 16px;}
.bcard{position:relative;background:var(--white);border:1px solid var(--g200);border-radius:20px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.04);transition:transform .15s,box-shadow .15s,border-color .15s;}
.bcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(61,90,254,.12);border-color:transparent;}
.bcard:active{transform:scale(.98);}
.bc-link{position:absolute;inset:0;z-index:1;border-radius:20px;}
.bc-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:11px;}
.bc-cat{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--g600);min-width:0;}
.bc-cat .ico{width:26px;height:26px;border-radius:9px;background:var(--primary-light);display:grid;place-items:center;font-size:15px;flex-shrink:0;}
.bc-cat .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bc-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;position:relative;z-index:2;}
.bc-btn{width:34px;height:34px;border-radius:10px;border:none;background:transparent;display:grid;place-items:center;font-size:16px;color:var(--g400);transition:all .15s;}
.bc-btn:hover{background:var(--g100);color:var(--g600);}
.bc-bm.on{color:var(--primary);}
.bc-main{display:flex;gap:12px;}
.bc-text{flex:1;min-width:0;}
.bc-title{font-size:16px;font-weight:900;line-height:1.4;color:var(--g900);margin-bottom:6px;letter-spacing:-.01em;}
.bc-desc{font-size:13.5px;font-weight:500;color:var(--g600);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.bc-thumb{width:80px;height:80px;border-radius:12px;background:var(--primary-light);display:grid;place-items:center;font-size:36px;flex-shrink:0;}
.bc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.bc-tag{font-size:11px;font-weight:600;color:var(--g600);background:var(--g100);border-radius:100px;padding:4px 10px;}
.bc-tag.pri{color:var(--primary-dark);background:var(--primary-light);}
.bc-foot{display:flex;align-items:center;gap:14px;margin-top:13px;padding-top:12px;border-top:1px solid var(--g100);font-size:12px;font-weight:600;color:var(--g400);}
.bc-foot .sp{margin-left:auto;}
.b-new{display:inline-block;font-size:10px;font-weight:800;color:#fff;background:var(--primary);padding:2px 8px;border-radius:100px;vertical-align:middle;margin-right:6px;}
.b-hot{display:inline-block;font-size:10px;font-weight:800;color:var(--red);background:#FFE9EB;padding:2px 8px;border-radius:100px;vertical-align:middle;margin-right:6px;}
.empty{text-align:center;color:var(--g400);font-size:14px;font-weight:600;padding:50px 20px;}
.empty .em{font-size:40px;display:block;margin-bottom:10px;}

/* ── 광고 ── */
.ad-slot{margin:18px 16px;min-height:90px;text-align:center;background:var(--g100);border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ad-slot ins{width:100%;}

/* ── FAB ── */
.fab{position:fixed;right:16px;bottom:calc(var(--tabbar) + 16px);z-index:330;width:52px;height:52px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:26px;font-weight:400;display:grid;place-items:center;box-shadow:0 8px 20px rgba(61,90,254,.42);transition:transform .15s,background .15s;}
.fab:hover{background:var(--primary-dark);}
.fab:active{transform:scale(.92);}

/* ── 푸터 ── */
.foot{background:var(--g900);color:rgba(255,255,255,.6);padding:28px 18px;margin-top:18px;}
.foot .f-logo{font-size:16px;font-weight:900;color:#fff;margin-bottom:8px;}
.foot .f-logo b{color:#7B8FFF;}
.foot .f-nav{display:flex;flex-wrap:wrap;gap:10px 18px;margin:12px 0;}
.foot .f-nav a{font-size:13px;color:rgba(255,255,255,.65);}
.foot .f-nav a:hover{color:#7B8FFF;}
.foot .f-copy{font-size:11.5px;color:rgba(255,255,255,.42);line-height:1.7;margin-top:8px;}

/* ── 모바일 하단 탭바 ── */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:320;height:calc(var(--tabbar) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--g200);display:flex;}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--g400);font-size:10.5px;font-weight:700;}
.tabbar .tb .tb-ico{font-size:20px;line-height:1;}
.tabbar .tb.active{color:var(--primary);}

/* ============ 반응형 ============ */
@media (min-width:769px){
  .feed{grid-template-columns:1fr 1fr;gap:14px;}
}
@media (min-width:1025px){
  .tabbar{display:none;}
  .shell{padding-bottom:40px;padding-left:24px;padding-right:24px;}
  .fab{bottom:28px;}
  .feed{grid-template-columns:repeat(3,1fr);gap:20px;}
  .bcard:hover{cursor:pointer;}
  .catinfo,.searchbar,.sortrow,.feed{padding-left:0;padding-right:0;}
  .catinfo{border-radius:0;}
  .ad-slot{margin-left:0;margin-right:0;}
}
</style>
</head>

    {e:'📈',n:'손익분기점(BEP) 계산기',d:'고정비·변동비율로 최소 목표 매출을 한눈에',u:'bep-calc.html',t:['BEP','손익분기','고정비'],sub:'매출·수익'},
    {e:'🍽️',n:'메뉴 원가율 계산기',d:'재료비·판매가로 원가율·마진율·권장가 계산',u:'food-cost-calc.html',t:['원가율','마진율','판매가'],sub:'매출·수익'},
    {e:'💼',n:'퇴직금 계산기',d:'근속기간·평균임금으로 법정 퇴직금 자동 산출',u:'severance-calc.html',t:['퇴직금','법정','직원'],sub:'인사·노무'},
    {e:'📅',n:'주휴수당 계산기',d:'시급·근무시간으로 주휴수당 지급 여부와 금액 계산',u:'weekly-pay-calc.html',t:['주휴수당','시급'],sub:'인사·노무'},
    {e:'🛡️',n:'4대보험 계산기',d:'직원 공제액과 사업주 부담액을 동시에 계산',u:'insurance-4d-calc.html',t:['4대보험','직원','사업주'],sub:'인사·노무'},
    {e:'🌴',n:'직원 연차 계산기',d:'입사일로 연차 발생 일수와 미사용 연차수당 계산',u:'annual-leave-calc.html',t:['연차','법정','휴가'],sub:'인사·노무'},
    {e:'🏪',n:'매장 수익성 계산기',d:'월 매출·비용으로 영업이익률과 순이익을 계산',u:'store-profit-calc.html',t:['매출','이익률','순이익'],sub:'매출·수익'},
    {e:'📣',n:'배달앱 광고비 ROI 계산기',d:'광고비 대비 추가 주문·ROI·손익분기 주문수 계산',u:'delivery-ads-calc.html',t:['배달광고','ROI'],sub:'매출·수익'},
    {e:'📍',n:'플레이스 광고비 계산기',d:'예산·CPC·전환율로 방문 고객·고객당 광고비 계산',u:'naver-ads-calc.html',t:['플레이스','CPC','광고'],sub:'매출·수익'},
    {e:'🏠',n:'임대료 인상 상한 계산기',d:'현재 월세 기준 법정 5% 상한 인상액 계산',u:'rent-increase-calc.html',t:['임대료','5%상한'],sub:'세무·비용'},
    {e:'💳',n:'카드수수료 계산기',d:'월 카드매출 기준 우대수수료율·월·연 수수료 계산',u:'card-fee-calc.html',t:['카드수수료','단말기'],sub:'세무·비용'},
    {e:'🔑',n:'권리금 계산기',d:'순이익·시설 잔존가치로 적정 권리금 범위 계산',u:'premium-calc.html',t:['권리금','시설가치'],sub:'세무·비용'},
    {e:'💵',n:'정책자금 이자 계산기',d:'대출금·금리·기간으로 월 상환액·총이자 계산',u:'loan-interest-calc.html',t:['정책자금','대출','이자'],sub:'세무·비용'},
    {e:'📦',n:'폐업 비용 계산기',d:'철거비·퇴직금·재고에서 지원금 차감한 실부담 계산',u:'closure-cost-calc.html',t:['폐업','철거','지원금'],sub:'세무·비용'},
    {e:'🚀',n:'창업 초기비용 계산기',d:'업종·평수로 창업비용과 월 손익분기를 추정',u:'startup-cost-calc.html',t:['창업','초기자금'],sub:'창업'}
  ];

  /* 카테고리 정의: tags=태그 매칭, kw=키워드 매칭, sub=필터 칩 */
  var CATS={
    all:        {name:'전체 가이드', emoji:'📖', sub:['전체','북마크']},
    calculator: {name:'무료 계산기', emoji:'🧮', calc:true, sub:['전체','인사·노무','매출·수익','세무·비용','창업','북마크']},
    place:      {name:'네이버 플레이스', emoji:'📍', tags:['네이버 플레이스'], sub:['전체','상위노출','리뷰','사진','북마크']},
    delivery:   {name:'배달앱', emoji:'🛵', tags:['배달앱'], sub:['전체','수수료','광고','리뷰','북마크']},
    support:    {name:'소상공인 지원금', emoji:'💰', tags:['소상공인 지원금'], kw:['지원금','정책자금','보험'], sub:['전체','정책자금','보험','폐업','북마크']},
    sns:        {name:'SNS·숏폼', emoji:'📱', tags:['SNS','숏폼'], sub:['전체','인스타','숏폼','블로그','북마크']},
    startup:    {name:'창업·세금', emoji:'🏪', tags:['창업·세금','세무·회계','직원/알바','안전 관리'], sub:['전체','세금','노무','창업비용','북마크']},
    card:       {name:'카드·결제', emoji:'💳', kw:['카드','결제','단말기','수수료','포스','키오스크'], sub:['전체','수수료','단말기','북마크']}
  };

  var BM_KEY='soho_bookmarks';
  function getBm(){try{return JSON.parse(localStorage.getItem(BM_KEY))||{};}catch(e){return {};}}
  function setBm(o){try{localStorage.setItem(BM_KEY,JSON.stringify(o));}catch(e){}}
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function hash(s){var h=0;for(var i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return Math.abs(h);}
  function viewsOf(u){return (hash(u)%90+10)*100 + (hash(u+'v')%900);}
  function likesOf(u){return hash(u+'l')%480+20;}
  function fmt(n){return n.toLocaleString('ko-KR');}
  function splitTag(t){t=(t||'').trim();var i=t.indexOf(' ');return i>0?{e:t.slice(0,i),x:t.slice(i+1)}:{e:'📄',x:t};}

  var params=new URLSearchParams(location.search);
  var catKey=params.get('cat')||'all';
  var query=(params.get('q')||'').trim();
  if(!CATS[catKey])catKey='all';
  var cat=CATS[catKey];
  var bm=getBm();
  var activeSub='전체';
  var sortMode='pop';

  /* search-data → 공통 아이템 모양으로 정규화 */
  function normArticle(a){
    var st=splitTag(a.tag);
    return {e:st.e, cat:st.x, n:a.title, d:a.desc, u:a.url, dt:(a.date||'').replace(/-/g,'.'),
            rt:a.rt||'', kw:(a.keywords||'')+' '+st.x, date:a.date||'', isCalc:false,
            t:(a.keywords||'').split(',').slice(0,3)};
  }
  function normCalc(c){
    return {e:c.e, cat:'무료 계산기', n:c.n, d:c.d, u:c.u, dt:'', rt:'무료',
            kw:c.t.join(' ')+' '+c.sub, date:'', isCalc:true, t:c.t, sub:c.sub};
  }

  function matchCat(item){
    if(cat.calc)return item.isCalc;
    if(catKey==='all')return !item.isCalc;
    if(item.isCalc)return false;
    var hay=(item.cat+' '+item.kw).toLowerCase();
    if(cat.tags&&cat.tags.some(function(t){return item.cat.indexOf(t)>=0;}))return true;
    if(cat.kw&&cat.kw.some(function(k){return hay.indexOf(k.toLowerCase())>=0;}))return true;
    return false;
  }
  function matchSub(item){
    if(activeSub==='전체')return true;
    if(activeSub==='북마크')return window.SohoCards?SohoCards.isBookmarked(item.u):!!bm[item.u];
    if(item.isCalc)return (item.sub||'')===activeSub;
    return (item.cat+' '+item.kw).toLowerCase().indexOf(activeSub.toLowerCase())>=0;
  }
  function matchQuery(item){
    if(!query)return true;
    return (item.n+' '+item.d+' '+item.kw).toLowerCase().indexOf(query.toLowerCase())>=0;
  }
  function isNew(item){return item.date && item.date>='2026-06-20';}

  function sortItems(arr){
    /* 최신순: 작성일 내림차순 */
    if(sortMode==='new')return arr.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    /* 조회순: 순수 조회수 내림차순 (계산기 우선 없음) */
    if(sortMode==='view')return arr.slice().sort(function(a,b){return viewsOf(b.u)-viewsOf(a.u);});
    /* 인기순(기본): 계산기 우선 + 조회·좋아요 가중 점수 */
    return arr.slice().sort(function(a,b){
      if(a.isCalc!==b.isCalc)return a.isCalc?-1:1;
      return (viewsOf(b.u)+likesOf(b.u)*3)-(viewsOf(a.u)+likesOf(a.u)*3);
    });
  }

  /* 계산기 URL → SVG 아이콘/색 매핑 (이모지 대체) */
  var CALC_VIS={
    'alba-cost-calc.html':{icon:'Users',color:'#3D5AFE'},'severance-calc.html':{icon:'Briefcase',color:'#00B8D9'},
    'weekly-pay-calc.html':{icon:'Clock',color:'#3D5AFE'},'insurance-4d-calc.html':{icon:'Shield',color:'#3D5AFE'},
    'annual-leave-calc.html':{icon:'CalendarDays',color:'#00B8D9'},'delivery-profit-calc.html':{icon:'Bike',color:'#FF6B35'},
    'food-cost-calc.html':{icon:'UtensilsCrossed',color:'#E040FB'},'bep-calc.html':{icon:'TrendingUp',color:'#FFB800'},
    'store-profit-calc.html':{icon:'BarChart2',color:'#3D5AFE'},'delivery-ads-calc.html':{icon:'Megaphone',color:'#FF6B35'},
    'naver-ads-calc.html':{icon:'MapPin',color:'#00C471'},'vat-calc.html':{icon:'Receipt',color:'#00C471'},
    'rent-increase-calc.html':{icon:'Home',color:'#F04452'},'card-fee-calc.html':{icon:'CreditCard',color:'#00B8D9'},
    'premium-calc.html':{icon:'KeyRound',color:'#FFB800'},'loan-interest-calc.html':{icon:'Banknote',color:'#00B8D9'},
    'closure-cost-calc.html':{icon:'Package',color:'#6B7684'},'startup-cost-calc.html':{icon:'Rocket',color:'#F04452'}
  };
  /* 게시글 카테고리명 → SVG 아이콘/색 */
  function catVis(name){
    name=name||'';
    if(/플레이스/.test(name))return{icon:'MapPin',color:'#00C471'};
    if(/배달/.test(name))return{icon:'Bike',color:'#FF6B35'};
    if(/지원금|정책|보험/.test(name))return{icon:'Banknote',color:'#3D5AFE'};
    if(/SNS|숏폼|인스타|블로그/.test(name))return{icon:'Camera',color:'#E040FB'};
    if(/마케팅|광고/.test(name))return{icon:'Megaphone',color:'#FF6B35'};
    if(/카드|결제|단말/.test(name))return{icon:'CreditCard',color:'#00B8D9'};
    if(/노무|직원|알바|채용/.test(name))return{icon:'Users',color:'#3D5AFE'};
    return{icon:'FileText',color:'#6B7684'};
  }
  function card(item){
    if(!window.SohoCards)return '';
    var u=item.u, v=viewsOf(u);
    if(item.isCalc){
      var ci=CALC_VIS[u]||{icon:'Calculator',color:'#3D5AFE'};
      return SohoCards.calculator({name:item.n,desc:item.d,href:u,tags:item.t,views:v,isNew:isNew(item),icon:ci.icon,color:ci.color});
    }
    var cv=catVis(item.cat);
    return SohoCards.article({title:item.n,desc:item.d,url:u,categoryName:item.cat,categoryIcon:cv.icon,categoryColor:cv.color,tags:item.t,views:v,likes:likesOf(u),date:item.dt,isNew:isNew(item),isHot:(v>7000)});
  }

  var ALL=[];

  function currentSet(){
    var set=ALL.filter(function(it){
      if(query)return matchQuery(it);   /* 검색 모드: 전체 풀에서 검색 */
      return matchCat(it)&&matchSub(it);
    });
    return sortItems(set);
  }

  function renderHeader(){
    var emoji=query?'🔍':cat.emoji;
    var name=query?('“'+query+'” 검색 결과'):cat.name;
    document.getElementById('cat-title-text').textContent=query?('“'+query+'” 검색'):cat.name;
    document.querySelector('#cat-title span[aria-hidden]').textContent=emoji;
    document.getElementById('ci-ico').textContent=emoji;
    document.getElementById('ci-name').textContent=name;
    document.title=name+' | 소호팁';
  }

  function renderChips(){
    var box=document.getElementById('chips');
    if(query){box.style.display='none';return;}
    box.style.display='';
    box.innerHTML=(cat.sub||['전체','북마크']).map(function(s){
      return '<button class="chip'+(s===activeSub?' active':'')+'" data-sub="'+esc(s)+'" role="tab" aria-selected="'+(s===activeSub?'true':'false')+'">'+esc(s)+'</button>';
    }).join('');
  }

  function renderFeed(){
    var set=currentSet();
    document.getElementById('total-cnt').textContent=set.length;
    document.getElementById('ci-cnt').textContent=(query?'검색 결과 ':'게시글 ')+set.length+'개';
    var feed=document.getElementById('feed');
    if(!set.length){
      feed.innerHTML='<div class="empty" style="grid-column:1/-1"><span class="em" aria-hidden="true">🔍</span>'+(activeSub==='북마크'?'아직 북마크한 글이 없어요. 카드의 북마크 버튼으로 저장해 보세요.':'조건에 맞는 글이 없어요.')+'</div>';
      return;
    }
    feed.innerHTML=set.map(card).join('');
    if(window.SohoCards)SohoCards.mount(feed);
    if(set.length>5){
      var ad='<div class="ad-slot" style="grid-column:1/-1">'+
        '<ins class="adsbygoogle" style="display:block;min-height:90px" data-ad-client="ca-pub-4059494172804910" data-ad-slot="여기에_광고슬롯ID2" data-ad-format="auto" data-full-width-responsive="true"></ins>'+
        '</div>';
      var cards=feed.querySelectorAll('.sc-card');
      if(cards[5]){cards[5].insertAdjacentHTML('beforebegin',ad);try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}}
    }
  }

  function renderAll(){renderHeader();renderChips();renderFeed();}

  /* ── 이벤트 ── */
  document.getElementById('btn-back').addEventListener('click',function(){
    if(history.length>1)history.back(); else location.href='index.html';
  });
  document.getElementById('btn-search').addEventListener('click',function(){
    var i=document.getElementById('cat-q');i.focus();i.scrollIntoView({block:'center',behavior:'smooth'});
  });
  document.getElementById('chips').addEventListener('click',function(e){
    var c=e.target.closest('.chip');if(!c)return;
    activeSub=c.getAttribute('data-sub');renderChips();renderFeed();
  });
  document.getElementById('sort').addEventListener('change',function(){sortMode=this.value;renderFeed();});
  var qIn=document.getElementById('cat-q'), clr=document.getElementById('s-clear');
  qIn.addEventListener('input',function(){
    query=this.value.trim();
    clr.classList.toggle('show',!!query);
    renderAll();
  });
  clr.addEventListener('click',function(){qIn.value='';query='';clr.classList.remove('show');renderAll();qIn.focus();});

  /* 북마크: SohoCards가 토글·저장(localStorage sohotip_) 담당.
     '북마크' 필터 활성 시 토글되면 피드 갱신 */
  document.addEventListener('sohocards:bookmark',function(){
    if(activeSub==='북마크')renderFeed();
  });

  /* ── 데이터 로드 ── */
  if(query)qIn.value=query;
  fetch('search-data.json').then(function(r){return r.json();}).then(function(data){
    ALL=CALCS.map(normCalc).concat((data||[]).map(normArticle));
    renderAll();
  }).catch(function(){
    ALL=CALCS.map(normCalc);
    renderAll();
  });
})();
</script>
