<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>페이지를 찾을 수 없어요 (404) — 소호팁</title>
<meta name="description" content="요청하신 페이지를 찾을 수 없습니다. 소호팁의 무료 계산기와 실전 가이드를 이용해 보세요.">
<link rel="canonical" href="https://sohotip.co.kr/404.html">
<link rel="icon" type="image/svg+xml" href="https://sohotip.co.kr/favicon.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#F4F6FB;color:#191F28;line-height:1.6;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{max-width:520px;width:100%;text-align:center;}
  .code{font-size:64px;font-weight:900;letter-spacing:-.04em;color:#3D5AFE;line-height:1;}
  h1{font-size:22px;font-weight:800;margin:14px 0 8px;letter-spacing:-.02em;}
  p{font-size:15px;font-weight:500;color:#6B7684;margin-bottom:24px;}
  .links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .btn{display:inline-flex;align-items:center;justify-content:center;height:48px;padding:0 20px;border-radius:14px;
       font-size:14px;font-weight:700;text-decoration:none;transition:opacity .15s,background .15s;}
  .btn.primary{background:#3D5AFE;color:#fff;}
  .btn.primary:hover{background:#2541E0;}
  .btn.ghost{background:#fff;color:#3D5AFE;border:1px solid #E5E8EB;}
  .btn.ghost:hover{border-color:#3D5AFE;}
</style>
</head>
<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>찾으시는 페이지가 없어요</h1>
    <p>주소가 바뀌었거나 삭제된 페이지일 수 있어요. 아래에서 필요한 걸 바로 찾아보세요.</p>
    <div class="links">
      <a class="btn primary" href="/">소호팁 홈으로</a>
      <a class="btn ghost" href="tools.html">무료 계산기</a>
      <a class="btn ghost" href="category.html">실전 가이드</a>
      <a class="btn ghost" href="forms.html">무료 서식</a>
    </div>
  </main>
</body>
</html>
