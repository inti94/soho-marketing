<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>소호팁 컴포넌트 데모 — 카드 · 공유</title>
  <link rel="stylesheet" href="assets/soho-cards.css?v=20260630e" />
  <style>
    body { margin: 0; font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif; background: #F2F4F6; color: #191F28; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 22px; font-weight: 800; }
    h2 { font-size: 15px; font-weight: 700; color: #6B7684; margin: 36px 0 14px; }
    .note { font-size: 13px; color: #8B95A1; line-height: 1.6; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .stack { display: flex; flex-direction: column; gap: 8px; max-width: 460px; }
    .bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="assets/theme.css?v=20260630e">
</head>
<body>
  <div class="wrap">
    <h1>소호팁 컴포넌트 데모</h1>
    <p class="note">React <code>ShareButton</code> · <code>ArticleCard</code> · <code>CalculatorCard</code> 를 이 사이트의 바닐라 HTML/JS/CSS 로 이식한 결과입니다.<br />
    공유 버튼(카카오톡 / 링크 복사 / 더 보기)·북마크 토글이 실제로 동작합니다.</p>

    <h2>공유 버튼 (ShareButton)</h2>
    <div class="bar" id="demo-share"></div>

    <h2>게시글 카드 (ArticleCard)</h2>
    <div class="grid" id="demo-articles"></div>

    <h2>계산기 카드 — 기본 (CalculatorCard / default)</h2>
    <div class="grid" id="demo-calc-default"></div>

    <h2>계산기 카드 — 컴팩트 (compact)</h2>
    <div class="stack" id="demo-calc-compact"></div>

    <h2>계산기 카드 — 랭킹 (rank)</h2>
    <div class="stack" id="demo-calc-rank"></div>
  </div>

  <script src="assets/soho-share.js?v=20260630e"></script>
  <script src="assets/soho-cards.js?v=20260630e"></script>
  <script>
    /* ── 샘플 데이터 ─────────────────────────── */
    var articles = [
      { id: 'naver-place-ranking-2026', categoryName: '마케팅', categoryIcon: 'TrendingUp', categoryColor: '#3D5AFE',
        title: '네이버 플레이스 상위노출, 2026년 바뀐 기준 총정리', desc: '리뷰·저장·방문자 리뷰 가중치가 어떻게 달라졌는지 실제 순위 변동 사례로 정리했습니다.',
        tags: ['네이버플레이스', '상위노출', '로컬'], views: 18400, likes: 920, date: '2026-06-25', isNew: true, isHot: true, url: 'naver-place-ranking-2026.html' },
      { id: 'soho-jiwongeum-2026', categoryName: '창업·세금', categoryIcon: 'FileText', categoryColor: '#00C471',
        title: '2026년 소상공인 지원금, 내가 받을 수 있는 것만 골라봤다', desc: '신청 자격·금액·마감일을 표로 정리. 중복 가능한 항목까지 한 번에 확인하세요.',
        tags: ['지원금', '정책자금'], views: 9600, likes: 540, date: '2026-06-24' },
      { id: 'baemin-vs-coupang', categoryName: '배달', categoryIcon: 'Bike', categoryColor: '#FF6B35',
        title: '배민 vs 쿠팡이츠, 우리 가게는 어디가 남을까', desc: '수수료·광고비·정산 주기를 실제 매출 기준으로 비교했습니다.',
        tags: ['배달앱', '수수료'], views: 1230, likes: 88, date: '2026-06-23' }
    ];
    var calcs = [
      { id: 'labor-cost', name: '인건비 계산기', desc: '직원 수·시급 → 월 인건비와 4대보험 사업주 부담분까지', tags: ['인건비', '4대보험'], views: 24100, isHot: true },
      { id: 'delivery-profit', name: '배달 순이익 계산기', desc: '주문 금액에서 수수료·광고비·포장비 빼고 진짜 남는 돈', tags: ['배달', '순이익'], views: 31200, isNew: true },
      { id: 'vat', name: '부가세 계산기', desc: '매출·매입 입력하면 납부할 부가세를 바로 계산', tags: ['부가세', '세금'], views: 14800 }
    ];

    /* ── 렌더 ──────────────────────────────── */
    // 공유 버튼: 아이콘형 + pill형
    var shareHost = document.getElementById('demo-share');
    shareHost.appendChild(SohoShare.button({ title: '소호팁', description: '소상공인 정보 플랫폼', url: 'https://sohotip.co.kr', iconOnly: true }));
    shareHost.appendChild(SohoShare.button({ title: '소호팁', description: '소상공인 정보 플랫폼', url: 'https://sohotip.co.kr' }));

    document.getElementById('demo-articles').innerHTML = articles.map(SohoCards.article).join('');
    document.getElementById('demo-calc-default').innerHTML = calcs.map(function (c) { return SohoCards.calculator(c); }).join('');
    document.getElementById('demo-calc-compact').innerHTML = calcs.map(function (c) { return SohoCards.calculator(c, { variant: 'compact' }); }).join('');
    document.getElementById('demo-calc-rank').innerHTML = calcs.map(function (c, i) { return SohoCards.calculator(c, { variant: 'rank', rank: i + 1 }); }).join('');

    SohoCards.mount(document);
  </script>
</body>
</html>
