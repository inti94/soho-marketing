.calc-search{display:flex;align-items:center;gap:10px;background:var(--g100,#F2F4F6);border-radius:12px;padding:12px 16px;margin-bottom:14px;}

.calc-empty{padding:40px 16px;text-align:center;color:var(--text-light);font-size:14px;}

  var grid=document.getElementById('calc-grid');
  var totalEl=document.getElementById('calc-total');
  var emptyEl=document.getElementById('calc-empty');
  var qInput=document.getElementById('calc-q');
  var chipBox=document.getElementById('calc-chips');
  var activeCat='all';

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function cardHTML(c){
    var views=fmtCount(c.views)+'회';
    return '<a class="cg-card" href="'+esc(c.href)+'" title="'+esc(c.name)+'">'+
      '<span class="cg-ico" aria-hidden="true" style="background:'+c.color+'1A;color:'+c.color+'">'+iconSvg(c.icon)+'</span>'+
      '<span class="cg-name">'+esc(c.name)+'</span>'+
      '<span class="cg-desc">'+esc(c.desc)+'</span>'+
      '<span class="cg-views">'+views+'</span></a>';
  }
  function render(){
    var q=(qInput.value||'').trim().toLowerCase();
    var set=CALCS.filter(function(c){
      if(activeCat!=='all' && c.cat!==activeCat) return false;
      if(q){ var hay=(c.name+' '+(c.tags||[]).join(' ')+' '+c.desc).toLowerCase(); if(hay.indexOf(q)<0) return false; }
      return true;
    });
    grid.innerHTML=set.map(cardHTML).join('');
    totalEl.textContent=set.length;
    emptyEl.style.display=set.length?'none':'';
  }

  chipBox.addEventListener('click',function(e){
    var b=e.target.closest('.cchip'); if(!b || b.classList.contains('cchip-link')) return;
    activeCat=b.getAttribute('data-cat');
    Array.prototype.forEach.call(chipBox.querySelectorAll('.cchip'),function(c){c.classList.toggle('active',c===b);});
    render();
  });
  qInput.addEventListener('input',render);
  render();
})();
