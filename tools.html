.calc-search{display:flex;align-items:center;gap:10px;background:var(--g100,#F2F4F6);border-radius:12px;padding:12px 16px;margin-bottom:14px;}
.calc-search .ic{width:20px;height:20px;flex-shrink:0;fill:none;stroke:#9EA7B4;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.calc-search input{flex:1;border:none;background:transparent;outline:none;font-size:16px;font-family:inherit;color:var(--text);min-width:0;}
/* 필터칩: 가로 스크롤, 선택=#3D5AFE 배경 흰글자 */
.calc-chips{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.calc-chips::-webkit-scrollbar{display:none;}
.cchip{flex-shrink:0;border:none;background:#F2F4F6;color:#6B7684;font-size:14px;font-weight:600;padding:9px 16px;border-radius:9999px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap;transition:background .15s,color .15s;}
.cchip:hover{background:#E5E8EB;}
.cchip.active{background:#3D5AFE;color:#fff;}
.cchip .cchip-n{margin-left:5px;font-size:12px;font-weight:700;opacity:.6;}
.cchip .cchip-n:empty{display:none;}
.cchip-link{background:var(--primary-light);color:var(--primary);}
.cchip-link:hover{background:#E0E4FF;}
.calc-count{font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:16px;}
.calc-count b{color:var(--primary);font-weight:800;}
.calc-empty{padding:40px 16px;text-align:center;color:var(--text-light);font-size:14px;}

/* 계산기 그리드: 2/3/4열 gap12 · 아이콘48 + 이름14/700 + 설명12 + 조회수11 */
.calc-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:600px){.calc-grid2{grid-template-columns:repeat(3,1fr);}}

.cg-card{display:flex;flex-direction:column;gap:8px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:16px;text-decoration:none;color:var(--text);transition:transform .15s,box-shadow .15s,border-color .15s;}
.cg-card:hover{transform:translateY(-2px);border-color:transparent;box-shadow:0 8px 22px rgba(61,90,254,.12);}
.cg-card:active{transform:scale(.98);}
.cg-ico{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;flex-shrink:0;}

.cg-desc{font-size:12px;font-weight:500;color:#6B7684;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.notice{background:var(--primary-light);border-radius:14px;padding:20px 24px;text-align:center;margin-top:16px;}

footer a{color:rgba(255,255,255,.4);text-decoration:none;margin:0 8px;}

<script>
/* tools.html — 계산기 카드(SohoCards) + 검색·필터칩·카운트 */
(function(){
  /* SohoCards(assets/soho-cards.js) 로딩 실패·캐시 지연에도 계산기 목록이 항상 보이도록 폴백 제공.
     (예전엔 if(!window.SohoCards) return; 으로 조용히 0개가 되던 문제 수정) */
  var SC = window.SohoCards || null;
  function fmtCount(n){
    if(SC && SC.formatCount) return SC.formatCount(n);
    n=+n||0;
    if(n>=10000) return (Math.round(n/1000)/10)+'만';
    if(n>=1000)  return (Math.round(n/100)/10)+'천';
    return String(n);
  }
  function iconSvg(name){
    if(SC && SC.icon) return SC.icon(name,24);
    /* 폴백: 일반 계산기 아이콘 */
    return '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="14" x2="16" y2="18"/></svg>';
  }
  /* 계산기 목록은 단일 소스 assets/calcs.js(window.SOHO_CALCS)에서 가져옵니다.
     계산기 추가/삭제는 assets/calcs.js에서만 → 목록·개수 자동 반영. (여기 하드코딩 금지) */
  var CALCS=(window.SOHO_CALCS||[]).slice();
  var grid=document.getElementById('calc-grid');
  var totalEl=document.getElementById('calc-total');
  var emptyEl=document.getElementById('calc-empty');
  var qInput=document.getElementById('calc-q');
  var chipBox=document.getElementById('calc-chips');
  var activeCat='all';

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function cardHTML(c){
    var views=fmtCount(c.views)+'회';
    return '<a class="cg-card" href="'+esc(c.href)+'" title="'+esc(c.name)+'">'+
      '<span class="cg-ico" aria-hidden="true" style="background:'+c.color+'1A;color:'+c.color+'">'+iconSvg(c.icon)+'</span>'+
      '<span class="cg-name">'+esc(c.name)+'</span>'+
      '<span class="cg-desc">'+esc(c.desc)+'</span>'+
      '<span class="cg-views">'+views+'</span></a>';
  }
  function render(){
    var q=(qInput.value||'').trim().toLowerCase();
    var set=CALCS.filter(function(c){
      if(activeCat!=='all' && c.cat!==activeCat) return false;
      if(q){ var hay=(c.name+' '+(c.tags||[]).join(' ')+' '+c.desc).toLowerCase(); if(hay.indexOf(q)<0) return false; }
      return true;
    });
    grid.innerHTML=set.map(cardHTML).join('');
    totalEl.textContent=set.length;
    emptyEl.style.display=set.length?'none':'';
  }
  /* 히어로 h1·필터칩 개수: CALCS(단일 소스) 길이에서 자동 계산 → 계산기 추가 시 자동 갱신 */
  function setCounts(){
    var h1=document.getElementById('calc-h1-total');
    if(h1) h1.textContent=CALCS.length;
    var counts={all:CALCS.length};
    CALCS.forEach(function(c){counts[c.cat]=(counts[c.cat]||0)+1;});
    Array.prototype.forEach.call(chipBox.querySelectorAll('.cchip'),function(b){
      var cat=b.getAttribute('data-cat'); if(cat==null) return;
      var n=b.querySelector('.cchip-n'); if(n) n.textContent=(counts[cat]!=null?counts[cat]:0);
    });
  }
  setCounts();

  chipBox.addEventListener('click',function(e){
    var b=e.target.closest('.cchip'); if(!b || b.classList.contains('cchip-link')) return;
    activeCat=b.getAttribute('data-cat');
    Array.prototype.forEach.call(chipBox.querySelectorAll('.cchip'),function(c){c.classList.toggle('active',c===b);});
    render();
  });
  qInput.addEventListener('input',render);
  render();
})();
</script>
